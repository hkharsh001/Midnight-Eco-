<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MidnightEco — Explore Wallpapers</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🔝 TOP NAV -->
<header class="topbar">
  <div class="logo">
    🌙 MidnightEco
  </div>

  <div class="top-icons">
    <span>🔍</span>
    <span>🔔</span>
    <span>⋮</span>
  </div>
</header>

<!-- 🧭 CATEGORY SCROLL -->
<section class="categories">
  <div class="cat active">All</div>
  <div class="cat">Trending</div>
  <div class="cat">AMOLED</div>
  <div class="cat">Anime</div>
  <div class="cat">Cars</div>
  <div class="cat">Dark</div>
  <div class="cat">Minimal</div>
</section>

<!-- 🔥 HERO -->
<section class="hero">
  <h2>Explore Wallpapers</h2>
  <p>Mobile • Desktop • 4K</p>
</section>

<!-- 🖼️ GRID -->
<main>
  <div class="grid">

    <div class="item">
      <img src="https://picsum.photos/400/600?1">
      <div class="overlay">View</div>
    </div>

    <div class="item">
      <img src="https://picsum.photos/400/500?2">
      <div class="overlay">View</div>
    </div>

    <div class="item">
      <img src="https://picsum.photos/400/700?3">
      <div class="overlay">View</div>
    </div>

    <div class="item">
      <img src="https://picsum.photos/400/550?4">
      <div class="overlay">View</div>
    </div>

  </div>
</main>

<!-- ⏳ LOADER -->
<div class="loader">Loading more...</div>

<!-- 📱 BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="active">🏠</button>
  <button>📅</button>
  <button>☕</button>
  <button>🔖</button>
  <button>👤</button>
</nav>

<!-- 📄 FOOTER -->
<footer class="footer">
  <p>© 2026 MidnightEco • All rights reserved</p>
</footer>

</body>
</html>
