<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midnight Eco — Wallpapers</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== ROOT THEME ===== */
:root {
  --bg: #0A0A0A;
  --card: #111111;
  --border: #1F1F1F;
  --text: #FFFFFF;
  --text-secondary: #A1A1AA;
  --accent: #3B82F6;
}

.light {
  --bg: #FFFFFF;
  --card: #F8F9FA;
  --border: #E5E7EB;
  --text: #111827;
  --text-secondary: #6B7280;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* ===== NAVBAR ===== */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-weight: 600;
  font-size: 18px;
}

.nav-links {
  display: flex;
  gap: 20px;
}

.nav-links a {
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 14px;
}

.nav-links a:hover {
  color: var(--text);
}

.toggle {
  cursor: pointer;
  border: 1px solid var(--border);
  padding: 6px 10px;
  border-radius: 8px;
}

/* ===== HERO ===== */
.hero {
  text-align: center;
  padding: 60px 20px 30px;
}

.hero h1 {
  font-size: 32px;
  font-weight: 600;
}

.hero p {
  color: var(--text-secondary);
  margin-top: 10px;
  font-size: 14px;
}

/* ===== GRID ===== */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
}

/* ===== CARD ===== */
.card {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--card);
  transition: 0.25s ease;
  text-decoration: none;
  color: var(--text);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card span {
  display: block;
  padding: 8px;
  font-size: 13px;
  color: var(--text-secondary);
}

/* HOVER */
.card:hover {
  transform: scale(1.03);
  border-color: var(--accent);
}

.card::after {
  content: "Download";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: 0.25s;
  font-size: 14px;
}

.card:hover::after {
  opacity: 1;
}

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 30px 10px;
  font-size: 13px;
  color: var(--text-secondary);
  border-top: 1px solid var(--border);
  margin-top: 40px;
}

/* MOBILE */
@media(max-width:600px){
  .hero h1 {
    font-size: 24px;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Midnight Eco</div>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Collections</a>
    <a href="#">Contact</a>
  </div>

  <div class="toggle" id="toggle">🌓</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Curated Wallpapers. No Noise.</h1>
  <p>4K • AMOLED • Minimal • Daily Drops</p>
</div>

<!-- GRID -->
<div class="container">
  <div class="grid">

    <a href="#" class="card">
      <img src="https://raw.githubusercontent.com/hkharsh001/Midnight-Eco-/refs/heads/main/20250412_210014-COLLAGE.jpg">
      <span>Spiderman Pack</span>
    </a>

    <a href="#" class="card">
      <img src="https://raw.githubusercontent.com/hkharsh001/Midnight-Eco-/refs/heads/main/1000038072.webp">
      <span>Predator Pack</span>
    </a>

    <a href="#" class="card">
      <img src="https://raw.githubusercontent.com/hkharsh001/Midnight-Eco-/refs/heads/main/photo-collage.png%20(1).webp">
      <span>Batman Pack</span>
    </a>

    <a href="#" class="card">
      <img src="https://raw.githubusercontent.com/hkharsh001/Midnight-Eco-/refs/heads/main/Car%20pack%201.webp">
      <span>Car Pack</span>
    </a>

  </div>
</div>

<!-- FOOTER -->
<footer>
  © 2026 Midnight Eco • Privacy • Contact
</footer>

<script>
document.getElementById("toggle").onclick = () => {
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
