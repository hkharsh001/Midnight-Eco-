<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midnight Eco — Explore</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== THEME ===== */
:root {
  --bg: #0A0A0A;
  --card: #111;
  --text: #fff;
  --muted: #a1a1aa;
  --border: #1f1f1f;
  --accent: #3b82f6;
}

.light {
  --bg: #ffffff;
  --card: #f8f9fa;
  --text: #111;
  --muted: #6b7280;
  --border: #e5e7eb;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ===== TOP BAR ===== */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-weight: 600;
  font-size: 16px;
}

/* SEARCH */
.search {
  flex: 1;
  margin: 0 10px;
}

.search input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
  color: var(--text);
  outline: none;
}

/* TOGGLE */
.toggle {
  cursor: pointer;
  border: 1px solid var(--border);
  padding: 6px 10px;
  border-radius: 8px;
}

/* ===== CATEGORY SCROLL ===== */
.categories {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 12px;
  border-bottom: 1px solid var(--border);
}

.categories::-webkit-scrollbar {
  display: none;
}

.cat {
  white-space: nowrap;
  padding: 6px 12px;
  border-radius: 999px;
  background: var(--card);
  border: 1px solid var(--border);
  font-size: 13px;
  cursor: pointer;
}

.cat:hover {
  border-color: var(--accent);
}

/* ===== GRID ===== */
.grid {
  column-count: 2;
  column-gap: 10px;
  padding: 10px;
}

@media(min-width:600px){
  .grid { column-count: 3; }
}

@media(min-width:1000px){
  .grid { column-count: 4; }
}

/* ITEM */
.item {
  position: relative;
  margin-bottom: 10px;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
}

/* IMAGE */
.item img {
  width: 100%;
  display: block;
  border-radius: 12px;
}

/* OVERLAY */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  opacity: 0;
  transition: 0.25s ease;
}

.item:hover .overlay {
  opacity: 1;
}

/* BUTTON */
.btn {
  background: white;
  color: black;
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 6px;
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">Midnight Eco</div>

  <div class="search">
    <input type="text" placeholder="Search wallpapers...">
  </div>

  <div class="toggle" id="toggle">🌓</div>
</div>

<!-- CATEGORIES -->
<div class="categories">
  <div class="cat">All</div>
  <div class="cat">AMOLED</div>
  <div class="cat">Anime</div>
  <div class="cat">Cars</div>
  <div class="cat">Dark</div>
  <div class="cat">Minimal</div>
</div>

<!-- GRID -->
<div class="grid">

  <div class="item">
    <img src="https://raw.githubusercontent.com/hkharsh001/Midnight-Eco-/refs/heads/main/20250412_210014-COLLAGE.jpg">
    <div class="overlay">
      <div class="btn">Download</div>
    </div>
  </div>

  <div class="item">
    <img src="https://raw.githubusercontent.com/hkharsh001/Midnight-Eco-/refs/heads/main/1000038072.webp">
    <div class="overlay">
      <div class="btn">Download</div>
    </div>
  </div>

  <div class="item">
    <img src="https://raw.githubusercontent.com/hkharsh001/Midnight-Eco-/refs/heads/main/photo-collage.png%20(1).webp">
    <div class="overlay">
      <div class="btn">Download</div>
    </div>
  </div>

  <div class="item">
    <img src="https://raw.githubusercontent.com/hkharsh001/Midnight-Eco-/refs/heads/main/Car%20pack%201.webp">
    <div class="overlay">
      <div class="btn">Download</div>
    </div>
  </div>

</div>

<script>
document.getElementById("toggle").onclick = () => {
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
