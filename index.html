<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MidnightEco</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- ICONS (Lucide - clean icons) -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<!-- 🔝 TOPBAR -->
<header class="topbar">
  <div class="logo">
    <span class="moon"></span>
    MidnightEco
  </div>

  <div class="top-icons">
    <i data-lucide="search"></i>
    <i data-lucide="bell"></i>
    <i data-lucide="more-vertical"></i>
  </div>
</header>

<!-- 🧭 CATEGORY -->
<section class="categories">
  <div class="cat active">All</div>
  <div class="cat">Trending</div>
  <div class="cat">AMOLED</div>
  <div class="cat">Anime</div>
  <div class="cat">Cars</div>
  <div class="cat">Dark</div>
</section>

<!-- 🔥 HERO -->
<section class="hero">
  <h2>Explore Wallpapers</h2>
  <p>Mobile • Desktop • 4K</p>
</section>

<!-- 🖼️ GRID -->
<main>
  <div class="grid" id="grid"></div>
</main>

<!-- 📱 BOTTOM NAV -->
<nav class="bottom-nav">
  <i data-lucide="home" class="active"></i>
  <i data-lucide="compass"></i>
  <i data-lucide="heart"></i>
  <i data-lucide="bookmark"></i>
  <i data-lucide="user"></i>
</nav>

<script src="script.js"></script>

<!-- INIT ICONS -->
<script>
  lucide.createIcons();
</script>

</body>
</html>
