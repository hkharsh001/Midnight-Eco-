<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallpaper — MidnightEco</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>

/* ===== SAME GLOBAL STYLE ===== */
:root {
  --bg: #0a0a0a;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --text: #ffffff;
  --muted: #9ca3af;
  --accent: #8b5cf6;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-bottom: 70px;
}

/* ===== TOPBAR (SAME AS HOME) ===== */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
  position:sticky;
  top:0;
  background:rgba(10,10,10,0.9);
  backdrop-filter: blur(12px);
  border-bottom:1px solid var(--border);
}

.logo {
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:600;
}

.moon {
  width:16px;
  height:16px;
  border-radius:50%;
  background: linear-gradient(135deg,#facc15,#f97316);
}

.top-icons {
  display:flex;
  gap:16px;
}

.top-icons i {
  width:20px;
  height:20px;
  color:var(--muted);
}

/* ===== WALLPAPER VIEW ===== */
.wallpaper {
  padding:12px;
}

.wallpaper img {
  width:100%;
  border-radius:16px;
}

/* ===== ACTIONS ===== */
.actions {
  display:flex;
  gap:10px;
  padding:12px;
}

.btn {
  flex:1;
  padding:12px;
  text-align:center;
  border-radius:12px;
  background:linear-gradient(135deg,#8b5cf6,#6366f1);
  color:white;
  text-decoration:none;
  font-weight:500;
}

.btn.secondary {
  background:#111;
  border:1px solid #333;
}

/* ===== TAGS ===== */
.tags {
  padding:12px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.tags span {
  background:#111;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
}

/* ===== RELATED ===== */
.related {
  padding:10px;
}

.related h3 {
  margin-bottom:10px;
}

.grid {
  column-count:2;
  column-gap:10px;
}

.item {
  margin-bottom:10px;
  border-radius:12px;
  overflow:hidden;
}

.item img {
  width:100%;
  display:block;
}

/* ===== BOTTOM NAV (SAME AS HOME) ===== */
.bottom-nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:rgba(10,10,10,0.9);
  border-top:1px solid var(--border);
}

.bottom-nav i {
  width:22px;
  height:22px;
  color:var(--muted);
}

.bottom-nav i.active {
  color:white;
}

</style>
</head>

<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">
    <span class="moon"></span>
    MidnightEco
  </div>

  <div class="top-icons">
    <i data-lucide="search"></i>
    <i data-lucide="bell"></i>
    <i data-lucide="more-vertical"></i>
  </div>
</header>

<!-- WALLPAPER -->
<section class="wallpaper">
  <img id="mainImage" src="">
</section>

<!-- ACTION BUTTONS -->
<div class="actions">
  <a id="mobileBtn" class="btn">Download Mobile</a>
  <a id="desktopBtn" class="btn secondary">Download Desktop</a>
</div>

<!-- TAGS -->
<div class="tags" id="tags"></div>

<!-- RELATED -->
<div class="related">
  <h3>Related</h3>
  <div class="grid" id="relatedGrid"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <i data-lucide="home"></i>
  <i data-lucide="compass"></i>
  <i data-lucide="heart"></i>
  <i data-lucide="bookmark"></i>
  <i data-lucide="user" class="active"></i>
</nav>

<script>

/* ICON INIT */
lucide.createIcons();

/* GET ID */
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

/* TEMP DATA */
const wallpapers = [
  {
    id:"1",
    image:"https://picsum.photos/800/1200?1",
    mobile:"#",
    desktop:"#",
    tags:"dark,city"
  },
  {
    id:"2",
    image:"https://picsum.photos/800/1200?2",
    mobile:"#",
    desktop:"#",
    tags:"anime,color"
  }
];

/* FIND DATA */
const data = wallpapers.find(w => w.id === id) || wallpapers[0];

/* SET IMAGE */
document.getElementById("mainImage").src = data.image;

/* DOWNLOAD */
document.getElementById("mobileBtn").href = data.mobile;
document.getElementById("desktopBtn").href = data.desktop;

/* TAGS */
const tagBox = document.getElementById("tags");
data.tags.split(",").forEach(tag=>{
  const el = document.createElement("span");
  el.innerText = tag;
  tagBox.appendChild(el);
});

/* RELATED */
const relatedGrid = document.getElementById("relatedGrid");

wallpapers.forEach(w=>{
  if(w.id !== data.id){
    const div = document.createElement("div");
    div.className="item";

    div.innerHTML = `
      <a href="wallpaper.html?id=${w.id}">
        <img src="${w.image}">
      </a>
    `;

    relatedGrid.appendChild(div);
  }
});

</script>

</body>
</html>
